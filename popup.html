<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图个明白</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1e293b;
      background: #fff;
    }
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      padding: 20px 18px 18px;
      color: white;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header p {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 4px;
      line-height: 1.5;
    }
    .body { padding: 16px 18px; }
    .status-card {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .status-card.ok { border-color: #bbf7d0; background: #f0fdf4; color: #15803d; }
    .status-card.warn { border-color: #fde68a; background: #fffbeb; color: #92400e; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #22c55e; }
    .dot.amber { background: #f59e0b; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .how-to {
      font-size: 12px;
      color: #475569;
      line-height: 1.7;
      margin-bottom: 14px;
    }
    .how-to span {
      display: inline-block;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 5px;
      padding: 1px 7px;
      font-family: monospace;
      font-size: 11px;
      color: #334155;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
    }
    .btn-primary {
      background: #6366f1;
      color: white;
      margin-bottom: 8px;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary {
      background: #f8fafc;
      color: #475569;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover { background: #f1f5f9; }
    .footer {
      padding: 10px 18px;
      border-top: 1px solid #f1f5f9;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>✨ 图个明白</h1>
    <p>右键点击图片，一键生成中英双语 AI 提示词</p>
  </div>
  <div class="body">
    <div id="status-card" class="status-card warn">
      <div class="dot amber"></div>
      <span id="status-text">未配置 API Key</span>
    </div>
    <div class="section-title">使用方法</div>
    <div class="how-to">
      在任意网页上，<strong>右键点击图片</strong>，选择<br>
      <span>✨ 生成 AI 提示词</span><br>
      即可自动分析并生成提示词
    </div>
    <button class="btn btn-primary" id="open-options">⚙️ 配置 API 设置</button>
    <button class="btn btn-secondary" id="test-btn">测试当前配置</button>
  </div>
  <div class="footer">支持 OpenAI / Gemini / 任意兼容接口</div>
  <script src="popup.js"></script>
</body>
</html>
