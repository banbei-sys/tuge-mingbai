<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>图个明白 设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #1e293b;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .container { max-width: 560px; margin: 0 auto; }
    .page-header { margin-bottom: 32px; }
    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #0f172a;
    }
    .page-header p {
      font-size: 14px;
      color: #64748b;
      margin-top: 6px;
      line-height: 1.6;
    }
    .card {
      background: white;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f1f5f9;
    }
    .form-group { margin-bottom: 18px; }
    .form-group:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .label-hint {
      font-weight: 400;
      color: #94a3b8;
      font-size: 12px;
    }
    input, select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      color: #1e293b;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    input[type="password"] { font-family: monospace; letter-spacing: 0.05em; }
    .hint { font-size: 12px; color: #94a3b8; margin-top: 5px; }
    .hint a { color: #6366f1; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }
    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .preset-btn {
      padding: 8px 6px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
      font-size: 12px;
      font-weight: 500;
      color: #475569;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .preset-btn:hover { border-color: #6366f1; color: #6366f1; background: #eef2ff; }
    .btn-row { display: flex; gap: 10px; margin-top: 6px; }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .btn-primary { background: #6366f1; color: white; flex: 1; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    #save-feedback {
      font-size: 13px;
      color: #16a34a;
      font-weight: 500;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }
    .model-custom { display: none; margin-top: 8px; }
    .model-custom.show { display: block; }
    .eye-toggle {
      position: relative;
    }
    .eye-toggle input { padding-right: 36px; }
    .eye-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      color: #94a3b8;
      padding: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>✨ 图个明白 设置</h1>
      <p>配置您的 API 信息。所有数据仅存储在本地浏览器，不会上传至任何服务器。</p>
    </div>

    <div class="card">
      <div class="card-title">API 配置</div>

      <div class="form-group">
        <label>API Key</label>
        <div class="eye-toggle" style="position: relative;">
          <input type="password" id="api-key" placeholder="sk-..." />
          <button class="eye-btn" id="toggle-eye" title="显示/隐藏">👁</button>
        </div>
        <div class="hint">您的密钥仅保存在本地，<a href="https://platform.openai.com/api-keys" target="_blank">获取 OpenAI Key</a></div>
      </div>

      <div class="form-group">
        <label>API 服务地址 <span class="label-hint">（Base URL）</span></label>
        <div class="preset-grid">
          <button class="preset-btn" data-url="https://api.openai.com">OpenAI</button>
          <button class="preset-btn" data-url="https://generativelanguage.googleapis.com/v1beta/openai">Gemini</button>
          <button class="preset-btn" data-url="https://api.anthropic.com">Claude</button>
        </div>
        <input type="text" id="base-url" placeholder="https://api.openai.com" />
        <div class="hint">兼容 OpenAI 格式的任意接口均可使用</div>
      </div>

      <div class="form-group">
        <label>模型</label>
        <select id="model-select">
          <option value="gpt-4o">gpt-4o（推荐）</option>
          <option value="gpt-4o-mini">gpt-4o-mini（经济型）</option>
          <option value="gemini-2.0-flash">gemini-2.0-flash</option>
          <option value="gemini-1.5-pro">gemini-1.5-pro</option>
          <option value="claude-opus-4-6">claude-opus-4-6</option>
          <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
          <option value="custom">自定义...</option>
        </select>
        <div class="model-custom" id="model-custom">
          <input type="text" id="model-custom-input" placeholder="输入自定义模型名称" />
        </div>
        <div class="hint">需支持视觉（Vision）能力的模型</div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="save-btn">保存设置</button>
        <button class="btn btn-danger" id="clear-btn">清除</button>
      </div>
      <div id="save-feedback"></div>
    </div>

    <div class="card">
      <div class="card-title">使用说明</div>
      <div style="font-size: 13px; color: #475569; line-height: 1.9;">
        <p>① 配置好 API Key 和模型后点击保存</p>
        <p>② 在任意网页上 <strong>右键点击图片</strong></p>
        <p>③ 选择「✨ 生成 AI 提示词」</p>
        <p>④ 等待分析完成，结果以浮窗形式展示</p>
        <p>⑤ <strong>点击提示词文本</strong>即可一键复制</p>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
